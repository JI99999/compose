# 官方文档
# https://www.starvpn.cn
# https://doc.starvpn.cn
# https://doc.starvpn.cn/#/register
# 定价对比
# https://starvpn.cn/pricing

---
version: "3"
# 最后编辑时间：2026-05-31
services:
  starvpn:
    image: registry.cn-beijing.aliyuncs.com/ld_beijing/stars.client:latest
    # 镜像地址
    container_name: starvpn
    # 容器名字
    hostname: starvpn
    # 主机名，这里替换为你的设备名，在官网上就会显示设置的名称，方便辨识
    privileged: true
    # 特权模式，赋予容器几乎与主机相同的权限
    network_mode: host
    # 直接用host
    # ports:
      # - 7725:7725
      # WebUI 端口
    restart: unless-stopped
    # 重启策略，可根据实际情况而选择 no/always/unless-stopped/on-failure/on-failure:3
    labels:
      net.unraid.docker.managed: dockerman
      net.unraid.docker.webui: http://[IP]:[PORT:7725]
      # 适用于unraid界面打开WebUI，注意端口号写的是容器端口，如有自定义，自行修改
      net.unraid.docker.icon: /mnt/user/LOGO/emby.png
      # 适用于unraid的图标，可以写unRAID的路径地址，也可以写一个图标地址(局域网或广域网均可)
      # 注意：通过compose创建的docker容器，无法在unRAID上进行编辑
